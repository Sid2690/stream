name: CazéTV → Temporary Public HLS Link
on: workflow_dispatch

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 curl openssh-client

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install Deno (for yt-dlp JS runtime)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Find a free Brazil proxy
        id: proxy
        run: |
          # Fetch free proxy list filtered to Brazil (BR)
          pip install requests --quiet
          python3 << 'EOF'
          import urllib.request, json, os

          # Try free-proxy-list API
          url = "https://proxylist.geonode.com/api/proxy-list?limit=20&page=1&sort_by=lastChecked&sort_type=desc&country=BR&protocols=http"
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              data = json.loads(urllib.request.urlopen(req, timeout=10).read())
              proxies = data.get("data", [])
              for p in proxies:
                  proxy_str = f"http://{p['ip']}:{p['port']}"
                  print(f"PROXY={proxy_str}")
                  # Write first working one to env
                  with open(os.environ["GITHUB_ENV"], "a") as f:
                      f.write(f"BR_PROXY={proxy_str}\n")
                  break
          except Exception as e:
              print(f"Proxy fetch failed: {e}")
              # Fallback: use a known public SOCKS proxy or skip
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("BR_PROXY=\n")
          EOF

      - name: Start HLS stream with Brazil proxy
        run: |
          mkdir -p ~/hls

          # Build proxy flag if we have one
          PROXY_FLAG=""
          if [ -n "$BR_PROXY" ]; then
            PROXY_FLAG="--proxy $BR_PROXY"
            echo "Using proxy: $BR_PROXY"
          else
            echo "No proxy found, trying direct..."
          fi

          yt-dlp \
            --no-playlist \
            --live-from-start \
            $PROXY_FLAG \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o - \
            "https://www.youtube.com/watch?v=YCNysrewn7k" | \
          ffmpeg -re -i pipe:0 \
            -c:v copy -c:a aac \
            -f hls \
            -hls_time 4 \
            -hls_list_size 6 \
            -hls_flags delete_segments+append_list \
            ~/hls/stream.m3u8 &

          # Serve HLS directory
          cd ~/hls && python3 -m http.server 8080 &

          # Wait for playlist to appear
          echo "Waiting for HLS segments..."
          for i in $(seq 1 60); do
            [ -f ~/hls/stream.m3u8 ] && echo "Playlist ready!" && break
            sleep 2
          done
          ls -la ~/hls/ || true

      - name: Expose via Serveo and print correct URL
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << 'EOF'
          Host serveo.net
              StrictHostKeyChecking no
              ServerAliveInterval 30
              ServerAliveCountMax 10
          EOF

          # Start tunnel, log output
          ssh -R 80:localhost:8080 serveo.net \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            2>&1 | tee /tmp/serveo.log &

          sleep 10

          # Correctly parse the forwarding URL (not console.serveo.net)
          PUBLIC_URL=$(grep -o 'https://[a-zA-Z0-9_-]*\.serveousercontent\.com' /tmp/serveo.log | head -1)

          # Fallback to old format if needed
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL=$(grep -o 'https://[a-zA-Z0-9_-]*\.serveo\.net' /tmp/serveo.log | head -1)
          fi

          echo ""
          echo "========================================="
          echo "  COPY THIS URL INTO VLC:"
          echo "  $PUBLIC_URL/stream.m3u8"
          echo "========================================="

          # Keep alive for 5.5 hours
          sleep 19800
