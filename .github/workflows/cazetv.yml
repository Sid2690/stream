name: CazéTV → Temporary Public HLS Link
on: workflow_dispatch

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 curl openssh-client tor

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Configure Tor with Brazil exit node
        run: |
          sudo tee /etc/tor/torrc > /dev/null << 'EOF'
          SocksPort 9050
          ExitNodes {BR}
          StrictNodes 1
          EOF
          sudo systemctl restart tor
          # Wait for Tor to bootstrap
          echo "Waiting for Tor to connect..."
          for i in $(seq 1 30); do
            STATUS=$(sudo journalctl -u tor --no-pager -n 20 | grep -o 'Bootstrapped [0-9]*%' | tail -1)
            echo "Tor: $STATUS"
            echo "$STATUS" | grep -q "100%" && echo "Tor ready!" && break
            sleep 3
          done

      - name: Verify Brazil IP via Tor
        run: |
          COUNTRY=$(curl --socks5-hostname 127.0.0.1:9050 -s https://ipinfo.io/country)
          echo "Exit country: $COUNTRY"

      - name: Start HLS stream via Tor
        run: |
          mkdir -p ~/hls

          yt-dlp \
            --no-playlist \
            --live-from-start \
            --proxy "socks5://127.0.0.1:9050" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o - \
            "https://www.youtube.com/watch?v=YCNysrewn7k" | \
          ffmpeg -re -i pipe:0 \
            -c:v copy -c:a aac \
            -f hls \
            -hls_time 4 \
            -hls_list_size 6 \
            -hls_flags delete_segments+append_list \
            ~/hls/stream.m3u8 &

          # Serve HLS directory
          cd ~/hls && python3 -m http.server 8080 &

          # Wait for playlist to appear
          echo "Waiting for HLS segments..."
          for i in $(seq 1 60); do
            if [ -f ~/hls/stream.m3u8 ]; then
              echo "Playlist ready!"
              cat ~/hls/stream.m3u8
              break
            fi
            echo "Still waiting... ($i/60)"
            sleep 3
          done
          ls -la ~/hls/

      - name: Expose via Serveo
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << 'EOF'
          Host serveo.net
              StrictHostKeyChecking no
              ServerAliveInterval 30
              ServerAliveCountMax 10
          EOF

          ssh -R 80:localhost:8080 serveo.net \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            2>&1 | tee /tmp/serveo.log &

          sleep 10

          PUBLIC_URL=$(grep -o 'https://[a-zA-Z0-9_-]*\.serveousercontent\.com' /tmp/serveo.log | head -1)
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL=$(grep -o 'https://[a-zA-Z0-9_-]*\.serveo\.net' /tmp/serveo.log | head -1)
          fi

          echo ""
          echo "========================================="
          echo "  COPY THIS URL INTO VLC:"
          echo "  $PUBLIC_URL/stream.m3u8"
          echo "========================================="

          sleep 19800
