name: CazéTV → Temporary Public HLS Link
on: workflow_dispatch

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 curl openssh-client

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Start HLS stream
        run: |
          mkdir -p ~/hls

          yt-dlp \
            --no-playlist \
            --live-from-start \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o - \
            "https://www.youtube.com/watch?v=YCNysrewn7k" | \
          ffmpeg -re -i pipe:0 \
            -c:v copy -c:a aac \
            -f hls \
            -hls_time 4 \
            -hls_list_size 6 \
            -hls_flags delete_segments+append_list \
            ~/hls/stream.m3u8 &

          # Serve HLS directory
          cd ~/hls && python3 -m http.server 8080 &

          # Wait for playlist to appear
          echo "Waiting for HLS segments..."
          for i in $(seq 1 30); do
            [ -f ~/hls/stream.m3u8 ] && echo "Playlist ready!" && break
            sleep 2
          done

      - name: Expose via Serveo (no auth needed)
        run: |
          # Disable host key checking so it connects without prompts
          mkdir -p ~/.ssh
          echo "Host serveo.net" >> ~/.ssh/config
          echo "    StrictHostKeyChecking no" >> ~/.ssh/config
          echo "    ServerAliveInterval 60" >> ~/.ssh/config

          # Open SSH tunnel, capture assigned URL
          ssh -R 80:localhost:8080 serveo.net \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            2>&1 | tee /tmp/serveo.log &

          sleep 8

          # Parse and print the public URL
          PUBLIC_URL=$(grep -o 'https://[a-z0-9]*.serveo.net' /tmp/serveo.log | head -1)
          echo ""
          echo "========================================="
          echo "  HLS Stream URL:"
          echo "  $PUBLIC_URL/stream.m3u8"
          echo "========================================="

          # Keep alive
          sleep 21000
