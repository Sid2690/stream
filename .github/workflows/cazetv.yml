name: CazéTV → Temporary Public HLS Link

on: workflow_dispatch

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Windscribe + tools
        run: |
          wget https://windscribe.com/install/linux -O windscribe.deb
          sudo dpkg -i windscribe.deb || sudo apt-get install -f -y
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Login & Connect Brazil VPN
        run: |
          windscribe login -u ${{ secrets.WINDSCRIBE_USER }} -p ${{ secrets.WINDSCRIBE_PASS }}
          windscribe connect Brazil

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok

      - name: Start CazéTV HLS stream + HTTP server + ngrok
        run: |
          mkdir -p ~/hls
          # Pull CazéTV and output HLS (adjust URL if you have a specific live video)
          yt-dlp "https://www.youtube.com/cazetv" \
            --live-from-start \
            -o - | \
          ffmpeg -i pipe:0 \
            -c:v copy -c:a copy \
            -f hls -hls_time 4 -hls_list_size 6 -hls_flags delete_segments \
            ~/hls/stream.m3u8 &

          # Simple HTTP server on port 8000
          cd ~/hls && python3 -m http.server 8000 &
          sleep 10

          # Expose it publicly (free tier gives a random temporary URL)
          ngrok http 8000 --log=stdout
